<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strata Lift App | Data Vault</title>
    <style>
        /* BASE STYLES & FAT FINGER OPTIMIZATION */
        html, body { overscroll-behavior-y: none; touch-action: manipulation; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f111a; color: #fff; margin: 0; padding: 15px; user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0cf; padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 900; color: #fff; }
        .header span { color: #f39c12; }
        
        /* THE STEPPERS (ANCHOR POINT) */
        .stepper-panel { display: flex; gap: 15px; margin-bottom: 20px; }
        .stepper-group { flex: 1; background: #1a1d27; border: 1px solid #333; border-radius: 8px; padding: 15px; text-align: center; }
        .stepper-label { color: #888; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        .stepper-controls { display: flex; align-items: center; justify-content: space-between; }
        .btn-step { background: #333; color: #fff; border: none; border-radius: 8px; width: 60px; height: 60px; font-size: 2.5rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn-step:active { background: #0cf; color: #000; transform: scale(0.95); }
        .step-value { font-size: 2.5rem; font-weight: 900; color: #0cf; width: 80px; text-align: center; }

        /* DATA ENTRY BUTTONS (IDENTICAL TO ROPE APP) */
        .section-title { color: #888; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-data { background: #1a1d27; border: 2px solid #333; color: #fff; padding: 20px 10px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.1s; }
        .btn-data:active { transform: scale(0.98); }
        
        .btn-data.active-clear { background: #28a745; border-color: #28a745; color: #fff; }
        .btn-data.active-warn { background: #f1c40f; border-color: #f1c40f; color: #000; }
        .btn-data.active-danger { background: #d9534f; border-color: #d9534f; color: #fff; }

        /* INPUTS */
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-box { flex: 1; background: #111; border: 2px solid #444; color: #fff; padding: 15px; font-size: 1.2rem; border-radius: 8px; text-align: center; font-weight: bold; }
        .input-box:focus { border-color: #0cf; outline: none; }

        /* --- THE DATA VAULT --- */
        .vault-container { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 15px; height: 100px; overflow-y: auto; }
        .vault-title { font-size: 0.7rem; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .vault-log { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px 0; font-size: 0.9rem; }
        .vault-log.newest { color: #0cf; font-weight: bold; }
        .vault-id { font-weight: bold; width: 60px; }
        .vault-find { flex: 1; text-align: left; padding-left: 10px; }
        .vault-flir { color: #d080ff; font-weight: bold; }

        /* THE D-PAD */
        .dpad-container { background: #161922; border: 2px dashed #444; border-radius: 12px; padding: 15px; text-align: center; }
        .dpad-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .btn-dpad { background: #333; color: #fff; border: none; border-radius: 12px; height: 80px; font-size: 2.5rem; cursor: pointer; box-shadow: 0 6px 0 #111; transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-dpad span { font-size: 0.8rem; font-weight: bold; margin-top: 5px; color: #888; text-transform: uppercase; }
        .btn-dpad:active { transform: translateY(6px); box-shadow: 0 0 0 #111; background: #0cf; color: #000; }
        .btn-dpad:active span { color: #000; }
        
        .dpad-up { grid-column: 2; }
        .dpad-left { grid-column: 1; }
        .dpad-save { grid-column: 2; background: #0cf; color: #000; box-shadow: 0 6px 0 #007799; }
        .dpad-save span { color: #000; }
        .dpad-save:active { background: #fff; }
        .dpad-right { grid-column: 3; }
        .dpad-down { grid-column: 2; }

        /* FOOTER */
        .footer-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .btn-export { background: #8e44ad; color: #fff; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #5a2e7a; }

        /* VISUAL FLASH FEEDBACK */
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(40, 167, 69, 0.4); z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .flash-active { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <div class="header">
        <div>
            <h1>LIFT APP <span>| DATA VAULT</span></h1>
        </div>
        <div id="clock" style="color: #888; font-weight: bold;">00:00</div>
    </div>

    <div class="stepper-panel">
        <div class="stepper-group">
            <div class="stepper-label">COLUMN</div>
            <div class="stepper-controls">
                <button class="btn-step" onclick="changeCol(-1)">-</button>
                <div class="step-value" id="val-col">A</div>
                <button class="btn-step" onclick="changeCol(1)">+</button>
            </div>
        </div>
        <div class="stepper-group">
            <div class="stepper-label">FLOOR</div>
            <div class="stepper-controls">
                <button class="btn-step" onclick="changeFloor(-1)">-</button>
                <div class="step-value" id="val-floor" style="color:#fff;">1</div>
                <button class="btn-step" onclick="changeFloor(1)">+</button>
            </div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-data active-clear" id="btn-clear" onclick="toggleDefect('CLEAR')">✅ CLEAR</button>
        <button class="btn-data" id="btn-moisture" onclick="toggleDefect('MOISTURE')">💧 MOISTURE</button>
        <button class="btn-data" id="btn-spall" onclick="toggleDefect('SPALLING')">🧱 SPALLING</button>
        <button class="btn-data" id="btn-sealant" onclick="toggleDefect('SEALANT FAIL')">🔗 SEALANT FAIL</button>
    </div>

    <div class="input-row">
        <button class="btn-data" id="btn-meter" style="flex: 1; padding: 15px;" onclick="toggleMeter()">
            🌡️ METER PROVED: <span id="meter-val" style="color:#888;">NO</span>
        </button>
        <input type="number" id="input-flir" class="input-box" style="flex: 1; border-color:#d080ff;" placeholder="📸 FLIR #">
    </div>

    <div class="vault-container">
        <div class="vault-title">💾 RECENT LOGS (DATA VAULT)</div>
        <div id="vault-list">
            <div style="color:#555; font-size:0.8rem; text-align:center; margin-top:10px;">Awaiting first save...</div>
        </div>
    </div>

    <div class="dpad-container">
        <div class="dpad-grid">
            <div style="grid-column: 1;"></div>
            <button class="btn-dpad dpad-up" onclick="saveAndMove('UP')">⬆️<span>Floor Up</span></button>
            <div style="grid-column: 3;"></div>
            
            <button class="btn-dpad dpad-left" onclick="saveAndMove('LEFT')">⬅️<span>Col Left</span></button>
            <button class="btn-dpad dpad-save" onclick="saveAndMove('STAY')">💾<span>Save Only</span></button>
            <button class="btn-dpad dpad-right" onclick="saveAndMove('RIGHT')">➡️<span>Col Right</span></button>
            
            <div style="grid-column: 1;"></div>
            <button class="btn-dpad dpad-down" onclick="saveAndMove('DOWN')">⬇️<span>Floor Down</span></button>
            <div style="grid-column: 3;"></div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="btn-export" onclick="exportData()">📥 EXPORT CSV (<span id="log-count">0</span>)</button>
    </div>

    <script>
        // --- INFINITE COLUMN LOGIC ---
        // Converts 0->A, 1->B, 26->AA. Handles Negatives: -1-> -A, -2-> -B.
        function getColumnName(index) {
            if (index < 0) return "-" + getColumnName(Math.abs(index) - 1);
            let colName = '';
            let temp = index;
            while (temp >= 0) {
                colName = String.fromCharCode(65 + (temp % 26)) + colName;
                temp = Math.floor(temp / 26) - 1;
            }
            return colName;
        }

        // --- STATE VARIABLES ---
        let state = {
            colIdx: 0,       // Starts at 0 (A)
            floor: 1,        
            findings: ["CLEAR"],
            meterProved: false
        };
        let logs = []; 

        // --- CLOCK ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0].substring(0, 5);
        }, 1000);

        // --- UI UPDATERS ---
        function updateUI() {
            // Update Steppers
            document.getElementById('val-col').innerText = getColumnName(state.colIdx);
            document.getElementById('val-floor').innerText = state.floor;
            
            // Update Findings Buttons
            document.getElementById('btn-clear').className = `btn-data ${state.findings.includes('CLEAR') ? 'active-clear' : ''}`;
            document.getElementById('btn-moisture').className = `btn-data ${state.findings.includes('MOISTURE') ? 'active-warn' : ''}`;
            document.getElementById('btn-spall').className = `btn-data ${state.findings.includes('SPALLING') ? 'active-danger' : ''}`;
            document.getElementById('btn-sealant').className = `btn-data ${state.findings.includes('SEALANT FAIL') ? 'active-danger' : ''}`;

            // Update Meter
            const meterBtn = document.getElementById('btn-meter');
            const meterVal = document.getElementById('meter-val');
            if(state.meterProved) {
                meterBtn.classList.add('active-warn'); meterVal.innerText = "YES"; meterVal.style.color = "#000";
            } else {
                meterBtn.classList.remove('active-warn'); meterVal.innerText = "NO"; meterVal.style.color = "#888";
            }
            
            // Update Export Count
            document.getElementById('log-count').innerText = logs.length;
        }

        function updateVault() {
            const vaultList = document.getElementById('vault-list');
            vaultList.innerHTML = ''; // Clear current list
            
            // Get the 5 most recent logs, reverse them so newest is on top
            const recentLogs = logs.slice(-5).reverse();
            
            recentLogs.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = `vault-log ${index === 0 ? 'newest' : ''}`;
                
                const emoji = log.findings.includes('CLEAR') ? '✅' : '🔴';
                const flirText = log.flir !== '--' ? ` [${log.flir}]` : '';

                div.innerHTML = `
                    <span class="vault-id">${log.id}</span>
                    <span class="vault-find">${emoji} ${log.findings} <span class="vault-flir">${flirText}</span></span>
                    <span style="color:#555; font-size:0.8rem;">${log.time}</span>
                `;
                vaultList.appendChild(div);
            });
        }

        // --- STEPPER CONTROLS ---
        function changeCol(dir) {
            state.colIdx += dir; // No limits! Can go to -1, -2, etc.
            updateUI();
        }

        function changeFloor(dir) {
            state.floor += dir;
            updateUI(); // Removed the floor < 1 limit in case they have underground basement levels (e.g., Floor 0, -1)
        }

        // --- DATA TOGGLES ---
        function toggleDefect(defectName) {
            if (defectName === 'CLEAR') {
                state.findings = ['CLEAR'];
                state.meterProved = false;
            } else {
                state.findings = state.findings.filter(f => f !== 'CLEAR');
                if (state.findings.includes(defectName)) {
                    state.findings = state.findings.filter(f => f !== defectName); 
                } else {
                    state.findings.push(defectName); 
                }
                if (state.findings.length === 0) state.findings = ['CLEAR'];
            }
            updateUI();
        }

        function toggleMeter() {
            state.meterProved = !state.meterProved;
            updateUI();
        }

        // --- THE MAGIC D-PAD LOGIC ---
        function saveAndMove(direction) {
            const date = new Date().toLocaleDateString();
            const time = new Date().toTimeString().split(' ')[0].substring(0, 5);
            
            const col = getColumnName(state.colIdx);
            const flr = state.floor;
            const windowID = `${col}-${flr}`; 
            
            let flirInput = document.getElementById('input-flir').value;
            let flirName = flirInput ? `FLIR${flirInput.padStart(4, '0')}` : "--";
            const finds = state.findings.join(' | ');
            const proved = state.meterProved ? "YES" : "NO";

            // Push to array (Hardcoded Project/Tech for pure speed, can add back to setup if needed)
            logs.push({ project: "Lift Drop", date, tech: "Operator", id: windowID, flir: flirName, findings: finds, proved, time });

            // Visual Flash
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 200);

            // Reset Inputs
            document.getElementById('input-flir').value = '';
            state.findings = ['CLEAR'];
            state.meterProved = false;

            // Update Vault Live
            updateVault();

            // Direct 1-to-1 Physical Movement
            if (direction === 'UP') changeFloor(1);
            else if (direction === 'DOWN') changeFloor(-1);
            else if (direction === 'LEFT') changeCol(-1);
            else if (direction === 'RIGHT') changeCol(1);
            else if (direction === 'STAY') updateUI(); 
        }

        // --- EXPORT MASTER CSV ---
        function exportData() {
            if (logs.length === 0) { alert("No data to export!"); return; }
            let csvContent = "Project, Date, Tech, ID, FLIR, Findings, Proved, Time\n";
            logs.forEach(row => {
                csvContent += `"${row.project}","${row.date}","${row.tech}","${row.id}","${row.flir}","${row.findings}","${row.proved}","${row.time}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `LIFT_Log_Vault.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        updateUI();
    </script>
</body>
</html>
